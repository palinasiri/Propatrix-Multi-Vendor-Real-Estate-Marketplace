
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post Your Property | PropVerse</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #eef1f6;
      color: #222;
    }

    /* Back arrow styling */
    .back-arrow {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      color: #00529B;
      text-decoration: none;
    }

    .container {
      max-width: 960px;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      background: #c1e8e8;
      box-shadow: 0 8px 16px rgba(0,0,0,0.1);
      border-radius: 12px;
      overflow: hidden;
      margin-top: 40px;
    }

    .right {
      flex: 1;
      padding: 30px;
    }

    h2 {
      margin-top: 0;
      font-weight: 600;
      color: #00529B;
    }

    .info-points {
      margin: 20px 0;
      list-style: none;
      padding: 0;
    }

    .info-points li {
      margin-bottom: 12px;
      font-size: 14px;
    }

    .info-points li i {
      color: #28a745;
      margin-right: 10px;
    }

    .form-section {
      margin-top: 20px;
    }

    .form-section label {
      font-weight: 500;
      display: block;
      margin-top: 15px;
    }

    .form-section input,
    .form-section select {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .submit-btn {
      background-color: #0077ff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 6px;
      margin-top: 20px;
      font-size: 15px;
      cursor: pointer;
      width: 100%;
    }

    .submit-btn:hover {
      background-color: #005bbb;
    }

    .image-section {
      flex: 1;
      background-color: #b8e2e2;
    }

    .ad-image {
      width: 100%;
      height: 100%;
      display: block;
      margin: 0 auto;
      border-top-right-radius: 12px;
      border-bottom-right-radius: 12px;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        margin-top: 20px;
      }
      .right {
        width: 100%;
        padding: 20px;
      }
      .image-section {
        width: 100%;
      }
      .submit-btn {
        padding: 15px;
        font-size: 16px;
      }
      .info-points li {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .container {
        margin-top: 10px;
      }
      .right {
        padding: 15px;
      }
      .submit-btn {
        font-size: 14px;
      }
      .form-section input,
      .form-section select {
        padding: 10px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
<a href="homepage.html" class="back-arrow">
  <i class="fas fa-arrow-left"></i>
</a>

<div class="container">
  <div class="right">
    <h2>Post Your Property</h2>
    <ul class="info-points">
      <li><i class="fas fa-circle-check"></i> Reach 5L+ verified buyers/tenants</li>
      <li><i class="fas fa-circle-check"></i> Free listing with no commission</li>
      <li><i class="fas fa-circle-check"></i> Professional guidance from experts</li>
    </ul>

    <div class="form-section">
      <label for="user-type">You are:</label>
      <select id="user-type">
        <option>Owner</option>
        <option>Agent</option>
        <option>Builder</option>
      </select>

      <label for="listing-type">You want to:</label>
      <select id="listing-type">
        <option>Sell</option>
        <option>Rent / Lease</option>
        <option>List as PG</option>
      </select>

      <label for="phone">WhatsApp Number:</label>
      <input type="tel" id="phone" placeholder="Enter your WhatsApp number" />

      <button class="submit-btn" onclick="submitProperty()">Submit Property</button>
    </div>
  </div>

  <div class="image-section">
    <img src="https://media.licdn.com/dms/image/v2/D4E12AQFzbS95jXUCLA/article-cover_image-shrink_720_1280/article-cover_image-shrink_720_1280/0/1701898353751?e=2147483647&v=beta&t=X5rYFhTNlbdOJ2n4-v1X5om-njA5ph0brK0LIjnyfcU" alt="Property Image" class="ad-image">
  </div>
</div>

<script>
  function submitProperty() {
    const userType = document.getElementById('user-type').value;
    const listingType = document.getElementById('listing-type').value;
    const phone = document.getElementById('phone').value;

    if (phone === '') {
      alert("Please enter your WhatsApp number.");
    } else {
      alert(`Thanks! We will contact you shortly as a ${userType} looking to ${listingType}.`);
    }
  }
</script>

</body>
</html>
